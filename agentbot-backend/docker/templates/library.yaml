---
# templates/dev-team.yaml
name: Dev Team
description: Product Manager + Engineer + QA
plan: collective
agents_count: 3

yaml: |
  models:
    default:
      provider: openai
      model: openrouter/xiaomi/mimo-v2-pro
      max_tokens: 32000
    lightweight:
      provider: openai
      model: openrouter/xiaomi/mimo-v2-pro
      max_tokens: 8192

  agents:
    root:
      model: default
      description: Product Manager — coordinates the team
      instruction: |
        You are the Product Manager leading a development team.

        Your responsibilities:
        - Break requirements into clear, small iterations
        - Each iteration delivers one complete feature end-to-end
        - Coordinate between engineer and QA
        - Define acceptance criteria for each feature
        - Track progress via todos

        Workflow per iteration:
        1. Define feature and acceptance criteria
        2. Delegate implementation to engineer
        3. Delegate testing to QA
        4. Address issues before next iteration

        Always use the right agent for the right task. Don't do everything yourself.

        Write all decisions to dev-team.md in the .dev-team directory.
        Append to the file, edit outdated info. Consult it for project state.

      sub_agents: [engineer, qa]
      toolsets:
        - type: filesystem
        - type: think
        - type: todo
          shared: true
        - type: memory
          path: dev_memory.db
        - type: mcp
          ref: docker:context7

    engineer:
      model: default
      description: Engineer — implements features, writes code, runs tests
      instruction: |
        You are the Engineer. Implement features based on PM requirements.

        Responsibilities:
        - Write clean, well-documented code
        - Choose appropriate tech stack
        - Run tests before marking complete
        - Report blockers immediately to the PM

        Technical guidelines:
        - Use modern frameworks and best practices
        - Write semantic, accessible code
        - Include error handling
        - Document API endpoints

        IMPORTANT: When running commands that produce large output,
        redirect to a file and read the file:
        `npm test > test-results.log 2>&1`
        Then read test-results.log to check results.

        Write all decisions to dev-team.md in the .dev-team directory.
      toolsets:
        - type: filesystem
        - type: shell
        - type: think
        - type: memory
          path: dev_memory.db
        - type: mcp
          ref: docker:context7

    qa:
      model: lightweight
      description: QA — tests implementations, reports bugs, verifies fixes
      instruction: |
        You are the QA agent. Test implementations from the Engineer.

        Responsibilities:
        - Test each feature against acceptance criteria
        - Report bugs with reproduction steps
        - Verify fixes before marking resolved
        - Maintain a test log

        IMPORTANT: When running test suites, redirect output to file:
        `npm test > qa-results.log 2>&1`
        Read qa-results.log to check for failures.

        Write all decisions to dev-team.md in the .dev-team directory.
      toolsets:
        - type: filesystem
        - type: shell
        - type: think
        - type: memory
          path: dev_memory.db

