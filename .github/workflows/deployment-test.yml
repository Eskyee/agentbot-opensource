name: Deployment Flow Test

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      telegramToken:
        description: 'Telegram Bot Token for testing'
        required: false
        type: string

jobs:
  test-deployment-flow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get environment variables
        env:
          API_URL: ${{ secrets.API_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          # Strip protocol if present
          CLEAN_URL=$(echo "$API_URL" | sed 's|https://||' | sed 's|http://||' | sed 's|/$||')
          echo "API_URL=$CLEAN_URL" >> $GITHUB_ENV

      - name: Test health endpoint
        id: health
        run: |
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.API_URL }}/api/health || echo "000")
          echo "health_status=$HEALTH" >> $GITHUB_OUTPUT
          if [ "$HEALTH" != "200" ]; then
            echo "❌ Health check failed (status: $HEALTH)"
            exit 1
          fi
          echo "✓ Health check passed"

      - name: Test OpenClaw version endpoint
        id: version
        run: |
          HTTP_CODE=$(curl -s -o /tmp/version_response.json -w "%{http_code}" \
            -H "User-Agent: GitHub-Actions" \
            -H "Accept: application/json" \
            https://${{ env.API_URL }}/api/openclaw-version)
          echo "version_http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          
          # Don't fail on version check errors - it's non-critical
          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️ Version endpoint returned HTTP $HTTP_CODE (non-critical)"
            cat /tmp/version_response.json || true
            echo "version_response={\"openclawVersion\":\"unknown\"}" >> $GITHUB_OUTPUT
          else
            RESPONSE=$(cat /tmp/version_response.json)
            echo "version_response=$RESPONSE" >> $GITHUB_OUTPUT
            
            VERSION=$(echo "$RESPONSE" | jq -r '.openclawVersion // empty')
            IMAGE=$(echo "$RESPONSE" | jq -r '.image // empty')
            
            if [ -z "$VERSION" ]; then
              echo "⚠️ Version endpoint returned invalid response"
            else
              echo "✓ OpenClaw version: $VERSION"
              echo "✓ Image: $IMAGE"
            fi
          fi

      - name: Test provision endpoint (optional)
        if: github.event.inputs.telegramToken != ''
        id: provision
        run: |
          HTTP_CODE=$(curl -s -o /tmp/provision_response.json -w "%{http_code}" -X POST https://${{ env.API_URL }}/api/provision \
            -H "Content-Type: application/json" \
            -d '{
              "telegramToken": "${{ github.event.inputs.telegramToken }}",
              "aiProvider": "openrouter"
            }')
          
          echo "provision_http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Provision failed (HTTP: $HTTP_CODE)"
            cat /tmp/provision_response.json
            exit 1
          fi
          
          RESPONSE=$(cat /tmp/provision_response.json)
          echo "provision_response=$RESPONSE" >> $GITHUB_OUTPUT
          
          SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
          
          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Provision failed: $RESPONSE"
            exit 1
          fi
          
          echo "✓ Provision endpoint working"
          echo "✓ Subdomain: $(echo $RESPONSE | jq -r '.subdomain')"

      - name: Run validation tests
        run: |
          echo "=== Deployment Flow Validation ==="
          echo "✓ Health: ${{ steps.health.outputs.health_status }}"
          echo "✓ Version: ${{ steps.version.outputs.version_response }}"
          echo "=== All tests passed ==="

      - name: Send success notification
        if: success()
        run: |
          echo "Deployment flow tests passed"

      - name: Send failure notification
        if: failure()
        run: |
          echo "Deployment flow tests FAILED"
          echo "Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
