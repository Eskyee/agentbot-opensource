name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install and lint backend
        run: |
          cd agentbot-backend
          npm ci
          npm run lint
          npm run build

      - name: Install and lint web
        run: |
          cd web
          npm ci
          npm run lint
          npm run build
