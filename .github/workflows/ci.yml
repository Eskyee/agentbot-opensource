name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install backend dependencies
        run: cd agentbot-backend && npm ci

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Lint
        run: |
          cd web && npm run lint
          cd ../agentbot-backend && npm run lint

      - name: Build
        run: |
          cd web && npm run build
          cd ../agentbot-backend && npm run build
