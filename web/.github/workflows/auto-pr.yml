name: Auto-create PR for Claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');

            // Check if a PR already exists for this branch
            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });

            if (existing.data.length > 0) {
              console.log(`PR already exists: #${existing.data[0].number}`);
              return;
            }

            // Build a title from the branch name
            // e.g. claude/remove-github-oauth-SMTz6 → Remove github oauth
            const slug = branch.replace(/^claude\//, '').replace(/-[A-Za-z0-9]{6,}$/, '');
            const title = slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              head: branch,
              base: 'main',
              body: [
                '## Claude Agent PR',
                '',
                `Branch: \`${branch}\``,
                '',
                '> Auto-created by the [auto-pr workflow](/.github/workflows/auto-pr.yml).',
                '> Review the commits below, then merge when ready to deploy to Vercel.',
              ].join('\n'),
            });

            console.log(`Created PR #${pr.data.number}: ${pr.data.html_url}`);
