name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

# Vercel deploys automatically via GitHub integration on every push to main.
# No manual deploy step needed.

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Push to main — Vercel GitHub integration handles deployment."
